# .github/workflows/release.yml  (new) — tag-driven release with PyPI
# Trusted Publishing (OIDC; no long-lived PyPI token exists anywhere).
name: release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Tag must match pyproject version
        run: |
          v=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          [ "v$v" = "${GITHUB_REF_NAME}" ] || { echo "::error::tag ${GITHUB_REF_NAME} != pyproject $v"; exit 1; }
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi               # protected env: required reviewer = 2nd maintainer
    permissions: { id-token: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1   # Trusted Publishing

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - name: Release notes from CHANGELOG section
        run: |
          awk "/^## ${GITHUB_REF_NAME#v}/,/^## /" CHANGELOG.md | head -n -1 > notes.md
          gh release create "${GITHUB_REF_NAME}" --notes-file notes.md dist/* || \
          gh release create "${GITHUB_REF_NAME}" --generate-notes
        env: { GH_TOKEN: "${{ github.token }}" }
