name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[dev]"
      - name: lint
        run: ruff check keel
      - name: types
        run: mypy
      - name: import layers
        run: lint-imports
      - name: unit + property + chaos
        run: pytest -q
